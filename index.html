<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<title>RedFoxAI</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#0d0d0f;
  --surface:#141416;
  --surface2:#1c1c1f;
  --border:#252529;
  --border2:#2e2e33;
  --accent:#ff5c35;
  --accent2:#ff8c6b;
  --text:#e8e8ec;
  --muted:#888896;
  --dim:#444450;
  --code-bg:#111114;
  --green:#4ade80;
  --red:#f87171;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Space Grotesk',sans-serif;font-size:15px;overflow:hidden}
.app{display:flex;flex-direction:column;height:100vh;height:100dvh;position:relative}

/* TOPBAR */
.topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:10px 12px;display:flex;align-items:center;gap:8px;flex-shrink:0;backdrop-filter:blur(10px)}
.btn-icon{background:none;border:1px solid var(--border);border-radius:9px;padding:7px;cursor:pointer;color:var(--muted);display:flex;align-items:center;justify-content:center;transition:all .15s}
.btn-icon:hover{border-color:var(--border2);color:var(--text)}
.btn-icon:active{background:var(--surface2)}
.btn-icon svg{width:17px;height:17px;display:block}
.model-wrap{flex:1;position:relative}
select{width:100%;background:var(--surface2);border:1px solid var(--border);color:var(--text);font-family:'Space Grotesk',sans-serif;font-size:13px;font-weight:500;padding:8px 28px 8px 10px;border-radius:9px;cursor:pointer;-webkit-appearance:none;appearance:none;outline:none;transition:border-color .15s}
select:focus{border-color:var(--accent)}
.arr{position:absolute;right:8px;top:50%;transform:translateY(-50%);pointer-events:none;color:var(--dim)}
.arr svg{width:13px;height:13px}
.api-btn{background:var(--surface2);border:1px solid var(--border);border-radius:9px;padding:7px 10px;cursor:pointer;display:flex;align-items:center;gap:5px;white-space:nowrap;font-family:'Space Grotesk',sans-serif;font-size:12px;color:var(--muted);transition:all .15s}
.api-btn:hover{border-color:var(--border2)}
.dot{width:7px;height:7px;border-radius:50%;background:var(--dim);flex-shrink:0;transition:background .3s}
.dot.ok{background:var(--green)}
.dot.err{background:var(--red)}

/* SIDEBAR */
.overlay-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:50;backdrop-filter:blur(2px)}
.overlay-bg.on{display:block}
.sidebar{position:fixed;top:0;left:0;height:100%;width:268px;background:var(--surface);border-right:1px solid var(--border);z-index:60;display:flex;flex-direction:column;transform:translateX(-100%);transition:transform 0.26s cubic-bezier(.4,0,.2,1)}
.sidebar.open{transform:translateX(0)}
.sb-head{padding:14px 12px 10px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.brand{display:flex;align-items:center;gap:9px}
.brand-icon{width:30px;height:30px;border-radius:9px;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;box-shadow:0 0 16px rgba(255,92,53,.3)}
.brand-icon svg{width:14px;height:14px;color:#fff}
.brand-name{font-size:15px;font-weight:700;letter-spacing:-.3px}
.btn-x{background:none;border:none;cursor:pointer;color:var(--dim);padding:5px;border-radius:6px;transition:color .15s}
.btn-x:hover{color:var(--text)}
.btn-x svg{width:17px;height:17px;display:block}
.sb-actions{padding:10px}
.btn-new{width:100%;background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;border:none;border-radius:10px;padding:10px;cursor:pointer;font-family:'Space Grotesk',sans-serif;font-size:13.5px;font-weight:600;display:flex;align-items:center;justify-content:center;gap:7px;box-shadow:0 4px 14px rgba(255,92,53,.25);transition:opacity .15s}
.btn-new:active{opacity:0.8}
.btn-new svg{width:15px;height:15px}
.conv-scroll{flex:1;overflow-y:auto;padding:4px 8px 12px;-webkit-overflow-scrolling:touch}
.conv-scroll::-webkit-scrollbar{width:3px}
.conv-scroll::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
.sec-label{font-size:10px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;color:var(--dim);padding:10px 8px 4px}
.conv-item{display:flex;align-items:center;gap:7px;padding:9px 8px;border-radius:9px;cursor:pointer;margin-bottom:1px;transition:background .12s}
.conv-item:hover,.conv-item.active{background:var(--surface2)}
.ci-icon{color:var(--dim);flex-shrink:0;display:flex}
.ci-icon svg{width:14px;height:14px}
.ci-text{flex:1;min-width:0}
.ci-title{font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--text)}
.ci-prev{font-size:11px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:1px}
.ci-del{background:none;border:none;cursor:pointer;color:var(--dim);padding:4px;border-radius:5px;flex-shrink:0;opacity:0;transition:opacity .15s,color .15s}
.conv-item:hover .ci-del{opacity:1}
.ci-del:hover{color:var(--red)}
.ci-del svg{width:13px;height:13px;display:block}

/* MESSAGES */
.msgs{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:16px 12px 8px;display:flex;flex-direction:column;gap:16px}
.msgs::-webkit-scrollbar{width:3px}
.msgs::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}

.msg-user{align-self:flex-end;max-width:84%;display:flex;flex-direction:column;gap:6px}
.msg-user-bubble{background:var(--surface2);border:1px solid var(--border2);padding:10px 13px;border-radius:15px 15px 3px 15px;font-size:14px;line-height:1.65;color:var(--text);word-break:break-word}
.msg-user-files{display:flex;flex-wrap:wrap;gap:6px;justify-content:flex-end}

.file-preview{position:relative;border-radius:9px;overflow:hidden;border:1px solid var(--border2);background:var(--surface2);max-width:200px}
.file-preview img{width:100%;height:auto;max-height:160px;object-fit:cover;display:block}
.file-thumb{display:flex;align-items:center;gap:8px;padding:8px 10px}
.file-thumb-icon{width:30px;height:30px;border-radius:7px;background:var(--border);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.file-thumb-icon svg{width:15px;height:15px;color:var(--accent)}
.file-thumb-name{font-size:12px;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:130px;font-weight:500}
.file-thumb-size{font-size:10px;color:var(--muted);margin-top:1px}

.msg-ai{align-self:flex-start;max-width:96%;display:flex;flex-direction:column;gap:6px}
.ai-hd{display:flex;align-items:center;gap:7px}
.ai-av{width:32px;height:32px;border-radius:7px;flex-shrink:0;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;box-shadow:0 2px 8px rgba(255,92,53,.25)}
.ai-av svg{width:11px;height:11px;color:#fff}
.ai-tag{font-size:10px;color:var(--dim);font-family:'JetBrains Mono',monospace;font-weight:500}
.ai-body{font-size:14px;line-height:1.75;color:#d4d4dc;word-break:break-word}
.ai-body p{margin-bottom:.5em}
.ai-body p:last-child{margin-bottom:0}
.ai-body strong{color:var(--text);font-weight:600}
.ai-body em{color:var(--muted)}
.ai-body ul,.ai-body ol{padding-left:1.4em;margin:.4em 0}
.ai-body li{margin:.2em 0}
.ai-body code{font-family:'JetBrains Mono',monospace;font-size:12.5px;background:var(--surface2);border:1px solid var(--border);padding:1px 5px;border-radius:4px;color:var(--accent2)}
.ai-body h1,.ai-body h2,.ai-body h3{color:var(--text);font-weight:600;margin:.6em 0 .3em}
.ai-body h1{font-size:17px}
.ai-body h2{font-size:15px}
.ai-body h3{font-size:14px}

/* CODE BLOCK */
.code-block{background:var(--code-bg);border:1px solid var(--border);border-radius:11px;margin:8px 0;overflow:hidden;font-family:'JetBrains Mono',monospace}
.code-header{display:flex;align-items:center;justify-content:space-between;padding:8px 12px;border-bottom:1px solid var(--border);background:rgba(255,255,255,.02)}
.code-lang{font-size:11px;color:var(--muted);font-weight:500;letter-spacing:.5px;text-transform:uppercase}
.code-actions{display:flex;gap:6px}
.code-copy-btn{background:none;border:1px solid var(--border2);cursor:pointer;color:var(--muted);display:inline-flex;align-items:center;gap:4px;font-size:11px;font-family:'Space Grotesk',sans-serif;padding:3px 9px;border-radius:6px;transition:all .15s;font-weight:500}
.code-copy-btn:hover{border-color:var(--accent);color:var(--accent)}
.code-copy-btn.copied{border-color:var(--green);color:var(--green)}
.code-copy-btn svg{width:11px;height:11px}
.code-preview-btn{background:none;border:1px solid var(--border2);cursor:pointer;color:var(--accent2);display:inline-flex;align-items:center;gap:4px;font-size:11px;font-family:'Space Grotesk',sans-serif;padding:3px 9px;border-radius:6px;transition:all .15s;font-weight:500}
.code-preview-btn:hover{border-color:var(--accent);color:var(--accent)}
.code-preview-btn svg{width:11px;height:11px}
/* PREVIEW MODAL */
.preview-modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.9);z-index:300;flex-direction:column}
.preview-modal-bg.on{display:flex}
.preview-bar{background:var(--surface);border-bottom:1px solid var(--border);padding:10px 14px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.preview-bar span{font-size:13px;font-weight:600;color:var(--text)}
.preview-bar button{background:none;border:1px solid var(--border2);color:var(--muted);padding:5px 12px;border-radius:8px;cursor:pointer;font-family:'Space Grotesk',sans-serif;font-size:12px;transition:all .15s}
.preview-bar button:hover{border-color:var(--accent);color:var(--accent)}
.preview-iframe{flex:1;border:none;background:#fff;width:100%}
.code-content{padding:12px 14px;overflow-x:auto;font-size:13px;line-height:1.65;color:#c9d1d9}
.code-content::-webkit-scrollbar{height:3px}
.code-content::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}

/* syntax colors */
.tok-kw{color:#ff7b72}
.tok-str{color:#a5d6ff}
.tok-num{color:#79c0ff}
.tok-cmt{color:#8b949e;font-style:italic}
.tok-fn{color:#d2a8ff}
.tok-op{color:#ff9a5c}
.tok-cmtl{color:#ffa657}
.tok-bool{color:#ff7b72}

.ai-copy{background:none;border:1px solid var(--border);cursor:pointer;color:var(--dim);display:inline-flex;align-items:center;gap:4px;font-size:11px;font-family:'Space Grotesk',sans-serif;padding:3px 9px;border-radius:6px;transition:all .15s;margin-top:2px;font-weight:500}
.ai-copy:hover{border-color:var(--border2);color:var(--muted)}
.ai-copy svg{width:11px;height:11px}

.typing-row{display:flex;align-items:center;gap:8px;align-self:flex-start}
.typing{display:flex;gap:4px}
.typing span{width:5px;height:5px;background:var(--accent);border-radius:50%;animation:bounce 1.1s infinite;display:block;opacity:.6}
.typing span:nth-child(2){animation-delay:.18s}
.typing span:nth-child(3){animation-delay:.36s}
.msg-err{align-self:flex-start;max-width:92%;background:rgba(248,113,113,.06);border:1px solid rgba(248,113,113,.2);color:var(--red);padding:10px 13px;border-radius:10px;font-size:13.5px;line-height:1.5}

/* EMPTY STATE */
.empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;padding:24px;text-align:center}
.e-icon{width:90px;height:90px;border-radius:16px;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;box-shadow:0 0 40px rgba(255,92,53,.25)}
.e-icon svg{width:24px;height:24px;color:#fff}
.e-title{font-size:18px;font-weight:700;letter-spacing:-.3px}
.e-sub{font-size:13px;color:var(--muted);max-width:240px;line-height:1.6}
.sugs{display:flex;flex-direction:column;gap:5px;width:100%;max-width:300px;margin-top:4px}
.sug{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:9px 13px;cursor:pointer;font-size:12.5px;color:var(--muted);text-align:left;font-family:'Space Grotesk',sans-serif;width:100%;transition:all .15s;font-weight:500}
.sug:hover{border-color:var(--border2);color:var(--text);background:var(--surface2)}

.disc{text-align:center;font-size:10.5px;color:var(--dim);padding:5px 12px;flex-shrink:0}

/* INPUT AREA */
.inp-area{flex-shrink:0;padding:6px 10px 12px;background:var(--bg)}

/* FILE PREVIEWS IN INPUT */
.inp-files{display:none;flex-wrap:wrap;gap:6px;padding:8px 10px 4px}
.inp-files.has-files{display:flex}
.inp-file-chip{display:flex;align-items:center;gap:6px;background:var(--surface2);border:1px solid var(--border2);border-radius:8px;padding:5px 8px;max-width:180px}
.inp-file-chip img{width:28px;height:28px;border-radius:5px;object-fit:cover;flex-shrink:0}
.inp-file-chip-icon{width:28px;height:28px;border-radius:5px;background:var(--border);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.inp-file-chip-icon svg{width:13px;height:13px;color:var(--accent)}
.inp-file-info{flex:1;min-width:0}
.inp-file-name{font-size:11px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--text)}
.inp-file-type{font-size:10px;color:var(--muted)}
.inp-file-remove{background:none;border:none;cursor:pointer;color:var(--dim);padding:2px;border-radius:4px;flex-shrink:0;display:flex;transition:color .15s}
.inp-file-remove:hover{color:var(--red)}
.inp-file-remove svg{width:12px;height:12px}

.inp-box{background:var(--surface);border:1px solid var(--border);border-radius:14px;overflow:hidden;transition:border-color .2s}
.inp-box:focus-within{border-color:var(--accent)}
.inp-row{display:flex;align-items:flex-end;gap:6px;padding:8px 10px}
textarea{flex:1;background:none;border:none;outline:none;color:var(--text);font-family:'Space Grotesk',sans-serif;font-size:14px;resize:none;min-height:22px;max-height:120px;line-height:1.55;padding:1px 0;-webkit-appearance:none}
textarea::placeholder{color:var(--dim)}
.inp-actions{display:flex;align-items:flex-end;gap:5px}

.btn-attach{width:32px;height:32px;flex-shrink:0;background:none;border:1px solid var(--border2);cursor:pointer;border-radius:8px;display:flex;align-items:center;justify-content:center;color:var(--muted);transition:all .15s}
.btn-attach:hover{border-color:var(--accent);color:var(--accent)}
.btn-attach svg{width:15px;height:15px}
#fileInput{display:none}

.btn-send{width:32px;height:32px;flex-shrink:0;background:linear-gradient(135deg,var(--accent),var(--accent2));border:none;cursor:pointer;border-radius:8px;display:flex;align-items:center;justify-content:center;color:#fff;box-shadow:0 2px 10px rgba(255,92,53,.3);transition:opacity .15s}
.btn-send:active{opacity:0.75}
.btn-send:disabled{opacity:0.2;cursor:not-allowed;box-shadow:none}
.btn-send svg{width:14px;height:14px}

/* MODAL */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:200;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(4px)}
.modal-bg.on{display:flex}
.modal{background:var(--surface);border:1px solid var(--border2);border-radius:16px;padding:22px;width:100%;max-width:330px;box-shadow:0 20px 60px rgba(0,0,0,.5)}
.modal h2{font-size:16px;font-weight:700;margin-bottom:4px;letter-spacing:-.2px}
.modal p{font-size:12.5px;color:var(--muted);margin-bottom:16px;line-height:1.6}
.modal label{font-size:11.5px;font-weight:600;color:var(--muted);display:block;margin-bottom:5px;text-transform:uppercase;letter-spacing:.5px}
.modal input{width:100%;background:var(--surface2);border:1px solid var(--border2);color:var(--text);font-family:'JetBrains Mono',monospace;font-size:13px;padding:10px 11px;border-radius:9px;outline:none;-webkit-appearance:none;transition:border-color .15s}
.modal input:focus{border-color:var(--accent)}
.modal-btns{display:flex;gap:7px;margin-top:16px}
.btn-p{flex:1;padding:10px;background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;border:none;border-radius:9px;font-family:'Space Grotesk',sans-serif;font-size:13.5px;font-weight:600;cursor:pointer;transition:opacity .15s}
.btn-p:active{opacity:0.8}
.btn-s{padding:10px 14px;background:var(--surface2);color:var(--muted);border:1px solid var(--border2);border-radius:9px;font-family:'Space Grotesk',sans-serif;font-size:13.5px;cursor:pointer;transition:all .15s}
.btn-s:hover{color:var(--text)}

@keyframes bounce{0%,80%,100%{transform:translateY(0)}40%{transform:translateY(-5px)}}

/* BLOCO PENSAMENTO */
.pensamento-wrap{margin:0 0 10px 0}
.pensamento-toggle{display:flex;align-items:center;gap:8px;cursor:pointer;padding:2px 0;user-select:none;-webkit-user-select:none}
.pt-dot{width:7px;height:7px;border-radius:50%;background:var(--accent);flex-shrink:0}
.pt-line{flex:1;height:1px;background:linear-gradient(to right,var(--accent),transparent)}
.pt-dot2{width:7px;height:7px;border-radius:50%;background:var(--accent);flex-shrink:0}
.pt-label{font-size:11px;color:var(--accent);font-family:'JetBrains Mono',monospace;font-weight:500;white-space:nowrap;order:-1}
.pensamento-body{font-size:12.5px;color:var(--muted);font-style:italic;line-height:1.65;padding:8px 0 4px 15px;border-left:2px solid var(--border2);margin-top:6px;display:block}
.pensamento-body.hidden{display:none}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
.stream-cursor{display:inline-block;animation:blink .7s infinite;color:var(--accent);font-weight:300;line-height:1}
.msg-ai,.msg-user{animation:fadeIn .2s ease}
</style>
</head>
<body>
<div class="app">

  <div class="overlay-bg" id="ovBg" onclick="closeSidebar()"></div>

  <!-- SIDEBAR -->
  <div class="sidebar" id="sidebar">
    <div class="sb-head">
      <div class="brand">
        <div class="brand-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 4c1.1 0 2 .9 2 2s-.9 2-2 2-2-.9-2-2 .9-2 2-2zm0 13c-2.33 0-4.31-1.46-5.11-3.5h10.22c-.8 2.04-2.78 3.5-5.11 3.5z"/></svg>
        </div>
        <span class="brand-name">RedFoxAI</span>
      </div>
      <button class="btn-x" onclick="closeSidebar()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6L6 18M6 6l12 12"/></svg></button>
    </div>
    <div class="sb-actions">
      <button class="btn-new" onclick="newChat()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg>Novo Chat</button>
    </div>
    <div class="conv-scroll" id="convList"></div>
  </div>

  <!-- MAIN CONTENT -->
  <div class="topbar">
    <button class="btn-icon" onclick="openSidebar()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12h18M3 6h18M3 18h18"/></svg></button>
    <div class="model-wrap">
      <select id="modelSelect">
        <option value="gpt-4">GPT-4</option>
        <option value="gpt-4-turbo">GPT-4 Turbo</option>
        <option value="gpt-3.5-turbo" selected>GPT-3.5 Turbo</option>
        <option value="gpt-4o">GPT-4o</option>
      </select>
      <div class="arr"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 9l6 6 6-6"/></svg></div>
    </div>
    <button class="api-btn" id="apiStatusBtn"><span class="dot" id="apiDot"></span><span id="apiStatusText">Verificando...</span></button>
  </div>

  <!-- MESSAGES AREA -->
  <div class="msgs" id="msgs"></div>

  <!-- INPUT AREA -->
  <div class="inp-area">
    <div class="inp-files" id="inpFiles"></div>
    <div class="inp-box">
      <div class="inp-row">
        <textarea id="prompt" rows="1" placeholder="Digite sua mensagem..."></textarea>
        <div class="inp-actions">
          <button class="btn-attach" id="attachBtn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M13 2L3 14h5v8h8v-8h5L13 2z"/></svg></button>
